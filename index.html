<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Advanced To-Do App</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body>

  <main class="container">

    <h1>To-Do List App</h1>

    <!-- Input Section -->

    <section class="todo-input-section">

      <input
        type="text"
        id="todo-input"
        placeholder="Enter a task..."
      />

      <button id="add-btn">
        Add Task
      </button>

    </section>

    <!-- Filter Buttons -->

    <section class="filter-section">

      <button data-filter="all">
        All
      </button>

      <button data-filter="active">
        Active
      </button>

      <button data-filter="completed">
        Completed
      </button>

    </section>

    <!-- Task List -->

    <ul id="todo-list"></ul>

  </main>

  <script src="js/script.js"></script>

</body>
</html>
